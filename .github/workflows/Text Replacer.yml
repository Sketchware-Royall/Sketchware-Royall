name: Unified Replace Tool

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Select mode"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - line
          - text

      file_input:
        description: "File name OR full path"
        required: true

      lines:
        description: "Lines (only for line mode)"
        required: false

      find_text:
        description: "Text to find (for text mode)"
        required: false

      replace_text:
        description: "Replacement text"
        required: true

      case_sensitive:
        description: "Case sensitive (text mode only)"
        required: true
        default: "true"
        type: choice
        options:
          - true
          - false

jobs:
  replace:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve file
        run: |
          INPUT="${{ github.event.inputs.file_input }}"

          if [ -f "$INPUT" ]; then
            FILE="$INPUT"
          else
            MATCHES=$(find . -type f -name "$INPUT")
            COUNT=$(echo "$MATCHES" | grep -c .)

            if [ "$COUNT" -eq 0 ]; then
              echo "❌ No file found"
              exit 1
            elif [ "$COUNT" -gt 1 ]; then
              echo "⚠️ Multiple files found:"
              echo "$MATCHES" | nl
              echo "👉 Use full path"
              exit 1
            else
              FILE="$MATCHES"
            fi
          fi

          echo "FILE=$FILE" >> $GITHUB_ENV

      - name: Build commands
        run: |
          MODE="${{ github.event.inputs.mode }}"
          FILE="${{ env.FILE }}"

          if [ "$MODE" = "line" ] || [ "$MODE" = "preview" ]; then
            INPUT="${{ github.event.inputs.lines }}"
            NEW="${{ github.event.inputs.replace_text }}"

            SED_EXPR=""

            if [ -n "$INPUT" ]; then
              IFS=',' read -ra PARTS <<< "$INPUT"
              for part in "${PARTS[@]}"; do
                if [[ "$part" == *"-"* ]]; then
                  START=$(echo $part | cut -d'-' -f1)
                  END=$(echo $part | cut -d'-' -f2)
                  SED_EXPR="${SED_EXPR}${START},${END}c\\$NEW\n"
                else
                  SED_EXPR="${SED_EXPR}${part}c\\$NEW\n"
                fi
              done
            fi

            echo "SED_EXPR<<EOF" >> $GITHUB_ENV
            echo "$SED_EXPR" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Preview
        if: ${{ github.event.inputs.mode == 'preview' }}
        run: |
          FILE="${{ env.FILE }}"
          SED_EXPR="${{ env.SED_EXPR }}"
          FIND="${{ github.event.inputs.find_text }}"
          REPLACE="${{ github.event.inputs.replace_text }}"
          CASE="${{ github.event.inputs.case_sensitive }}"

          echo "🔍 Preview"
          echo "--------------------------------"

          echo "📄 Original:"
          nl -ba "$FILE" | sed -n '1,200p'

          echo "--------------------------------"

          echo "✏️ After:"

          if [ -n "$SED_EXPR" ]; then
            sed "$SED_EXPR" "$FILE" | nl -ba | sed -n '1,200p'
          else
            FLAG="g"
            if [ "$CASE" = "false" ]; then FLAG="gi"; fi

            perl -pe "s/\Q$FIND\E/\Q$REPLACE\E/$FLAG" "$FILE" | nl -ba | sed -n '1,200p'
          fi

          echo "--------------------------------"
          echo "✅ Preview only"

      - name: Apply line replace
        if: ${{ github.event.inputs.mode == 'line' }}
        run: |
          FILE="${{ env.FILE }}"
          SED_EXPR="${{ env.SED_EXPR }}"

          TMP=$(mktemp)
          sed "$SED_EXPR" "$FILE" > "$TMP"
          mv "$TMP" "$FILE"

      - name: Apply text replace
        if: ${{ github.event.inputs.mode == 'text' }}
        run: |
          FILE="${{ env.FILE }}"
          FIND="${{ github.event.inputs.find_text }}"
          REPLACE="${{ github.event.inputs.replace_text }}"
          CASE="${{ github.event.inputs.case_sensitive }}"

          FLAG="g"
          if [ "$CASE" = "false" ]; then FLAG="gi"; fi

          perl -pi -e "s/\Q$FIND\E/\Q$REPLACE\E/$FLAG" "$FILE"

      - name: Commit & Push
        if: ${{ github.event.inputs.mode != 'preview' }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if git diff --quiet; then
            echo "No changes"
          else
            git add .
            git commit -m "Unified replace in ${{ env.FILE }}"
            git push
          fi