name: Smart Replace Tool

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Select mode"
        required: true
        default: "Preview"
        type: choice
        options:
          - Preview
          - Replace

      file_path:
        description: "Full file path"
        required: true

      lines:
        description: "Lines (optional, e.g. 10 or 10-12)"
        required: false

      find_text:
        description: "Text to find (used if lines empty)"
        required: false

      replace_text:
        description: "Replacement text"
        required: true

      case_sensitive:
        description: "Case sensitive (text mode)"
        required: true
        default: "true"
        type: choice
        options:
          - true
          - false

jobs:
  replace:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate file
        run: |
          FILE="${{ github.event.inputs.file_path }}"

          if [ ! -f "$FILE" ]; then
            echo "❌ File not found: $FILE"
            exit 1
          fi

          echo "FILE=$FILE" >> $GITHUB_ENV

      - name: Build logic
        run: |
          INPUT="${{ github.event.inputs.lines }}"
          NEW="${{ github.event.inputs.replace_text }}"

          SED_EXPR=""

          if [ -n "$INPUT" ]; then
            IFS=',' read -ra PARTS <<< "$INPUT"
            for part in "${PARTS[@]}"; do
              if [[ "$part" == *"-"* ]]; then
                START=$(echo $part | cut -d'-' -f1)
                END=$(echo $part | cut -d'-' -f2)
                SED_EXPR="${SED_EXPR}${START},${END}c\\$NEW\n"
              else
                SED_EXPR="${SED_EXPR}${part}c\\$NEW\n"
              fi
            done
          fi

          echo "SED_EXPR<<EOF" >> $GITHUB_ENV
          echo "$SED_EXPR" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Preview
        if: ${{ github.event.inputs.mode == 'Preview' }}
        run: |
          FILE="${{ env.FILE }}"
          SED_EXPR="${{ env.SED_EXPR }}"
          FIND="${{ github.event.inputs.find_text }}"
          REPLACE="${{ github.event.inputs.replace_text }}"
          CASE="${{ github.event.inputs.case_sensitive }}"

          echo "🔍 Preview"
          echo "--------------------------------"

          echo "📄 Original:"
          nl -ba "$FILE" | sed -n '1,200p'

          echo "--------------------------------"
          echo "✏️ After:"

          if [ -n "$SED_EXPR" ]; then
            echo "Mode: Line Replace"
            sed "$SED_EXPR" "$FILE" | nl -ba | sed -n '1,200p'
          else
            echo "Mode: Text Replace"
            FLAG="g"
            if [ "$CASE" = "false" ]; then FLAG="gi"; fi

            perl -pe "s/\Q$FIND\E/\Q$REPLACE\E/$FLAG" "$FILE" | nl -ba | sed -n '1,200p'
          fi

          echo "--------------------------------"
          echo "✅ Preview only"

      - name: Apply changes
        if: ${{ github.event.inputs.mode == 'Replace' }}
        run: |
          FILE="${{ env.FILE }}"
          SED_EXPR="${{ env.SED_EXPR }}"
          FIND="${{ github.event.inputs.find_text }}"
          REPLACE="${{ github.event.inputs.replace_text }}"
          CASE="${{ github.event.inputs.case_sensitive }}"

          if [ -n "$SED_EXPR" ]; then
            echo "Applying line replace"
            TMP=$(mktemp)
            sed "$SED_EXPR" "$FILE" > "$TMP"
            mv "$TMP" "$FILE"
          else
            echo "Applying text replace"
            FLAG="g"
            if [ "$CASE" = "false" ]; then FLAG="gi"; fi

            perl -pi -e "s/\Q$FIND\E/\Q$REPLACE\E/$FLAG" "$FILE"
          fi

      - name: Commit & Push
        if: ${{ github.event.inputs.mode == 'Replace' }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if git diff --quiet; then
            echo "No changes"
          else
            git add .
            git commit -m "Smart replace in ${{ env.FILE }}"
            git push
          fi