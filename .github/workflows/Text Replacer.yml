name: Smart Replace Tool

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Select mode"
        required: true
        default: "Preview"
        type: choice
        options:
          - Preview
          - Replace

      file_path:
        description: "Full file path"
        required: true

      lines:
        description: "Lines (optional, e.g. 10 or 10-12)"
        required: false

      find_text:
        description: "Text to find (used if lines empty)"
        required: false

      replace_text:
        description: "Replacement text (raw, multiline supported)"
        required: true

      case_sensitive:
        description: "Case sensitive (text mode)"
        required: true
        default: "true"
        type: choice
        options:
          - true
          - false

jobs:
  replace:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate file
        run: |
          FILE="${{ github.event.inputs.file_path }}"
          if [ ! -f "$FILE" ]; then
            echo "❌ File not found: $FILE"
            exit 1
          fi
          echo "FILE=$FILE" >> $GITHUB_ENV

      - name: Detect mode
        run: |
          if [ -n "${{ github.event.inputs.lines }}" ]; then
            echo "MODE_TYPE=line" >> $GITHUB_ENV
          else
            echo "MODE_TYPE=text" >> $GITHUB_ENV
          fi

      # 🔐 SAFE write (no YAML break)
      - name: Prepare replacement content
        run: |
          printf "%s\n" "${{ github.event.inputs.replace_text }}" > replace.txt

      # 🔍 PREVIEW
      - name: Preview
        if: ${{ github.event.inputs.mode == 'Preview' }}
        run: |
          FILE="${{ env.FILE }}"
          MODE_TYPE="${{ env.MODE_TYPE }}"
          INPUT="${{ github.event.inputs.lines }}"
          FIND="${{ github.event.inputs.find_text }}"
          CASE="${{ github.event.inputs.case_sensitive }}"

          echo "🔍 Preview (affected only)"
          echo "--------------------------------"

          if [ "$MODE_TYPE" = "line" ]; then
            IFS=',' read -ra PARTS <<< "$INPUT"

            for part in "${PARTS[@]}"; do
              if [[ "$part" == *"-"* ]]; then
                START=${part%-*}
                END=${part#*-}
              else
                START=$part
                END=$part
              fi

              FROM=$((START-2))
              [ "$FROM" -lt 1 ] && FROM=1
              TO=$((END+2))

              echo "👉 Lines $START-$END"
              echo "----- BEFORE -----"
              nl -ba "$FILE" | sed -n "${FROM},${TO}p"

              echo "----- AFTER ------"
              awk -v s="$START" -v e="$END" '
              NR==s {
                while ((getline line < "replace.txt") > 0) print line
                close("replace.txt")
                next
              }
              NR<s || NR>e {print}
              ' "$FILE" | nl -ba | sed -n "${FROM},${TO}p"

              echo "------------------"
            done

          else
            FLAG="g"
            [ "$CASE" = "false" ] && FLAG="gi"

            echo "👉 Matches:"
            grep -n "$FIND" "$FILE" || echo "No matches"

            echo "----- AFTER ------"
            perl -pe "s/\Q$FIND\E/$(cat replace.txt)/$FLAG" "$FILE" | grep -n "" || true
          fi

      # 🚀 APPLY
      - name: Apply changes
        if: ${{ github.event.inputs.mode == 'Replace' }}
        run: |
          FILE="${{ env.FILE }}"
          MODE_TYPE="${{ env.MODE_TYPE }}"
          INPUT="${{ github.event.inputs.lines }}"
          FIND="${{ github.event.inputs.find_text }}"
          CASE="${{ github.event.inputs.case_sensitive }}"

          if [ "$MODE_TYPE" = "line" ]; then
            TMP=$(mktemp)
            cp "$FILE" "$TMP"

            IFS=',' read -ra PARTS <<< "$INPUT"

            for part in "${PARTS[@]}"; do
              if [[ "$part" == *"-"* ]]; then
                START=${part%-*}
                END=${part#*-}
              else
                START=$part
                END=$part
              fi

              awk -v s="$START" -v e="$END" '
              NR==s {
                while ((getline line < "replace.txt") > 0) print line
                close("replace.txt")
                next
              }
              NR<s || NR>e {print}
              ' "$TMP" > "$TMP.new"

              mv "$TMP.new" "$TMP"
            done

            mv "$TMP" "$FILE"

          else
            FLAG="g"
            [ "$CASE" = "false" ] && FLAG="gi"

            perl -pi -e "s/\Q$FIND\E/$(cat replace.txt)/$FLAG" "$FILE"
          fi

      - name: Commit & Push
        if: ${{ github.event.inputs.mode == 'Replace' }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if git diff --quiet; then
            echo "No changes"
          else
            git add .
            git commit -m "Smart replace in ${{ env.FILE }}"
            git push
          fi
