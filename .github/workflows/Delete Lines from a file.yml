name: Lines Deleter

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Select mode"
        required: true
        default: "Preview"
        type: choice
        options:
          - Preview
          - Delete

      file_input:
        description: "File name OR Path"
        required: true

      lines:
        description: "Lines (e.g. 10 or 10-15 or 10,20)"
        required: true

jobs:
  Delete:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve file
        run: |
          INPUT="${{ github.event.inputs.file_input }}"

          if [ -f "$INPUT" ]; then
            FILE="$INPUT"
          else
            MATCHES=$(find . -type f -name "$INPUT")
            COUNT=$(echo "$MATCHES" | grep -c .)

            if [ "$COUNT" -eq 0 ]; then
              echo "❌ No file found"
              exit 1
            elif [ "$COUNT" -gt 1 ]; then
              echo "⚠️ Multiple files found:"
              echo "--------------------------------"
              echo "$MATCHES" | nl
              echo "--------------------------------"
              echo "👉 Re-run with full path"
              exit 1
            else
              FILE="$MATCHES"
            fi
          fi

          echo "Resolved file: $FILE"
          echo "FILE=$FILE" >> $GITHUB_ENV

      - name: Build sed expression
        run: |
          INPUT="${{ github.event.inputs.lines }}"
          SED_EXPR=""

          IFS=',' read -ra PARTS <<< "$INPUT"
          for part in "${PARTS[@]}"; do
            if [[ "$part" == *"-"* ]]; then
              START=$(echo $part | cut -d'-' -f1)
              END=$(echo $part | cut -d'-' -f2)
              SED_EXPR="${SED_EXPR}${START},${END}d;"
            else
              SED_EXPR="${SED_EXPR}${part}d;"
            fi
          done

          echo "SED_EXPR=$SED_EXPR" >> $GITHUB_ENV
          echo "Expression: $SED_EXPR"

      - name: Preview changes
        if: ${{ github.event.inputs.mode == 'Preview' }}
        run: |
          FILE="${{ env.FILE }}"
          SED_EXPR="${{ env.SED_EXPR }}"

          echo "🔍 Preview (lines to be removed):"
          echo "--------------------------------"

          sed -n "$(echo $SED_EXPR | sed 's/d/p/g')" "$FILE"

          echo "--------------------------------"
          echo "✅ Preview mode (no changes applied)"

      - name: Apply Delete
        if: ${{ github.event.inputs.mode == 'Delete' }}
        run: |
          FILE="${{ env.FILE }}"
          SED_EXPR="${{ env.SED_EXPR }}"

          sed -i "$SED_EXPR" "$FILE"

      - name: Commit & Push
        if: ${{ github.event.inputs.mode == 'Delete' }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if git diff --quiet; then
            echo "No changes"
          else
            git add .
            git commit -m "Delete lines from ${{ env.FILE }}"
            git push
          fi