name: Commit Reverter

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Revert mode"
        required: true
        default: "last"
        type: choice
        options:
          - last
          - single

      commit_id:
        description: "Commit ID (only for single mode)"
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  revert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Revert Commit
        run: |
          set -e

          MODE="${{ github.event.inputs.mode }}"

          if [ "$MODE" = "last" ]; then
            echo "Reverting last commit"
            git revert HEAD --no-edit

          elif [ "$MODE" = "single" ]; then
            COMMIT="${{ github.event.inputs.commit_id }}"
            if [ -z "$COMMIT" ]; then
              echo "❌ commit_id is required"
              exit 1
            fi
            echo "Reverting commit: $COMMIT"
            git revert $COMMIT --no-edit
          else
            echo "❌ Invalid mode"
            exit 1
          fi

      - name: Create Branch
        run: |
          BRANCH="revert-${{ github.run_id }}"
          git checkout -b $BRANCH
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Push Branch
        run: |
          git push origin $BRANCH

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ env.BRANCH }}
          base: ${{ github.ref_name }}
          title: "Revert commit (${{ github.event.inputs.mode }})"
          body: |
            This PR was automatically created to revert a commit.

            Mode: ${{ github.event.inputs.mode }}
            Commit: ${{ github.event.inputs.commit_id || 'HEAD' }}