name: Android CI

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - 'public-stable-ids.txt'
      - 'settings.gradle'
  workflow_dispatch:

jobs:
  notifyTelegram:
    name: Notify Telegram
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Send a message to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TGGOUPID }}
          TOPIC_ID: ${{ secrets.TGNIGHTLYTOPICID }}
        run: |
          python ./.github/workflows/notify_telegram.py
        continue-on-error: true

  build:
    name: Build APK
    runs-on: ubuntu-latest

    outputs:
      apk_name: ${{ steps.set_name.outputs.apk_name }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build Release APK
        env:
          SKETCHUB_API_KEY: ${{ secrets.SKETCHUB_API_KEY }}
          SW_KEY_PASS: ${{ secrets.SW_KEY_PASS }}
        run: gradle assembleRelease

      # 🔥 Create final APK name using run number
      - name: Set APK Name
        id: set_name
        run: |
          APK_NAME=Sketchware-Royall-#${{ github.run_number }}.apk
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT

      # 🔥 Rename APK directly to final name
      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/${{ steps.set_name.outputs.apk_name }}

      # 🔥 Upload with SAME name (important)
      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.set_name.outputs.apk_name }}
          path: app/build/outputs/apk/release/${{ steps.set_name.outputs.apk_name }}

  send:
    name: Send to Telegram
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v6

      # 🔥 Download artifact using SAME name
      - name: Download APK
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.apk_name }}
          path: ./apk

      # 🔥 Set APK path
      - name: Set APK Path
        run: |
          echo "APK_PATH=./apk/${{ needs.build.outputs.apk_name }}" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install requests
        run: pip install requests

      - name: Send APK to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
          APK_PATH: ${{ env.APK_PATH }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          python ./.github/workflows/deploy_artifacts.py

  updateAppData:
    name: Update App Data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Run Update App Script
        env:
          GH_ABOUT_APP_WORKFLOW_TOKEN: ${{ secrets.GH_ABOUT_APP_WORKFLOW_TOKEN }}
        run: python .github/workflows/update_app_data.py

      - name: Commit and Push Changes
        env:
          GH_ABOUT_APP_WORKFLOW_TOKEN: ${{ secrets.GH_ABOUT_APP_WORKFLOW_TOKEN }}
        run: |
          git checkout host
          git config --global user.name "Sketchware Pro Actions"
          git config --global user.email "hello@sketchware.bro"
          git add about.json
          git commit -m "feat: Update app about screen data"
          git push
        continue-on-error: true
